            font-size: 16px;

        .btn:hover {

        }

        .link-btn {

            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;

        .link-btn:hover {

        .main-app {

<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authContainer" class="auth-container">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <h2>Login</h2>
                <div class="form-group">

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button class="btn" onclick="login()">Login</button>
                <a href="#" class="link-btn" onclick="showRegister()">Register a New Account</a>
                <div id="loginError" class="error" style="display: none;"></div>
            </div>

            <!-- Registration Form -->
            <div id="registerForm" class="auth-form" style="display: none;">
                <h2>Register</h2>
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button class="btn" onclick="register()">Register</button>
                <a href="#" class="link-btn" onclick="showLogin()">Back to Login</a>
                <div id="registerError" class="error" style="display: none;"></div>
                <div id="registerSuccess" class="success" style="display: none;"></div>
            </div>
        </div>

        <!-- Main Application -->
        <div id="mainApp" class="main-app">
            <header class="app-header">
                <div class="app-title">Workout Tracker</div>
                <div>
                    <span id="currentUser" style="margin-right: 20px; font-weight: 600;"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </header>

            <div class="tab-container">
                <div class="tabs">
                    <div class="tab active" onclick="showTab('today')">Today's Workout</div>
                    <div class="tab" onclick="showTab('plan')">Weekly Plan</div>
                    <div class="tab" onclick="showTab('history')">History</div>
                    <div class="tab" onclick="showTab('analytics')">Analytics</div>
                </div>

                <div class="tab-content">
                    <!-- Today's Workout Tab -->
                    <div id="todayTab" class="tab-pane active">
                        <div class="workout-header">
                            <h2 id="todayTitle" class="workout-title"></h2>
                            <p id="todaySubtitle" class="workout-subtitle"></p>
                        </div>
                        <div id="todayWorkout" class="exercise-list"></div>
                        <button class="btn save-workout-btn" onclick="saveWorkout()">Save Workout</button>
                        <div id="saveMessage" class="success" style="display: none;"></div>
                    </div>

                    <!-- Weekly Plan Tab -->
                    <div id="planTab" class="tab-pane">
                        <h2 style="text-align: center; margin-bottom: 30px;">Weekly Workout Plan</h2>
                        <div id="weeklyPlanContent"></div>
                    </div>

                    <!-- History Tab -->
                    <div id="historyTab" class="tab-pane">
                        <h2 style="text-align: center; margin-bottom: 30px;">Workout History</h2>
                        <div id="historyContent"></div>
                    </div>

                    <!-- Analytics Tab -->
                    <div id="analyticsTab" class="tab-pane">
                        <h2 style="text-align: center; margin-bottom: 30px;">Analytics</h2>
                        <div id="analyticsContent"></div>
                    </div>
                </div>
            </div>

    </div>

        // Application state
        let currentUser = null;

        // Initialize application
        (function() {
            checkAuthStatus();
            registerServiceWorker();
        })();

        // Service Worker registration for PWA
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                // Create service worker inline
                const swCode = `
                    const CACHE_NAME = 'workout-tracker-v1';
                    const urlsToCache = ['/'];
                    
                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME)
                                .then(cache => cache.addAll(urlsToCache))
                        );
                    });
                    
                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request)
                                .then(response => response || fetch(event.request))
                        );
                    });
                `;
                
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(registration => console.log('SW registered'))
                    .catch(error => console.log('SW registration failed'));
            }
        }

        // Authentication functions
        function checkAuthStatus() {
            const savedUser = localStorage.getItem('workoutTrackerCurrentUser');
            if (savedUser) {
                currentUser = savedUser;
                showMainApp();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('currentUser').textContent = `Welcome, ${currentUser}`;
            loadTodayWorkout();

            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            clearErrors();

            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearErrors();

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('loginError', 'Please enter both username and password');
                return;
            }

            const users = JSON.parse(localStorage.getItem('workoutTrackerUsers') || '{}');
            const hashedPassword = btoa(password); // Simple encoding for demo

            if (users[username] && users[username] === hashedPassword) {
                currentUser = username;
                localStorage.setItem('workoutTrackerCurrentUser', username);
                showMainApp();
            } else {
                showError('loginError', 'Invalid username or password');
            }
        }

        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !password || !confirmPassword) {
                showError('registerError', 'Please fill in all fields');
                return;
            }

            if (password !== confirmPassword) {
                showError('registerError', 'Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('registerError', 'Password must be at least 6 characters long');
                return;
            }

            const users = JSON.parse(localStorage.getItem('workoutTrackerUsers') || '{}');

            if (users[username]) {
                showError('registerError', 'Username already exists');
                return;
            }

            const hashedPassword = btoa(password); // Simple encoding for demo
            users[username] = hashedPassword;
            localStorage.setItem('workoutTrackerUsers', JSON.stringify(users));

            showSuccess('registerSuccess', 'Registration successful! You can now login.');
            
            // Clear form
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function logout() {
            localStorage.removeItem('workoutTrackerCurrentUser');
            currentUser = null;
            showAuth();
        }

        // Tab functions
        function showTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');

            // Load specific tab content
            if (tabName === 'history') {
                loadHistory();
            } else if (tabName === 'analytics') {
                loadAnalytics();
            } else if (tabName === 'plan') {
                loadWeeklyPlan();
            }
        }

        // Workout functions
        function loadTodayWorkout() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const workout = workoutSchedule[dayOfWeek];

            document.getElementById('todayTitle').textContent = `${getDayName(dayOfWeek)}: ${workout.title}`;
            document.getElementById('todaySubtitle').textContent = workout.subtitle;

            const workoutContainer = document.getElementById('todayWorkout');
            workoutContainer.innerHTML = '';

            if (workout.exercises.length === 0) {
                workoutContainer.innerHTML = '<p style="text-align: center; color: #666; font-size: 1.2rem;">Rest Day - Enjoy your recovery!</p>';
                return;
            }

            workout.exercises.forEach((exercise, exerciseIndex) => {
                const exerciseDiv = document.createElement('div');
                exerciseDiv.className = 'exercise-item';

                let setsHTML = '';
                for (let i = 1; i <= exercise.sets; i++) {
                    if (exercise.type === 'bodyweight' || exercise.type === 'skill' || exercise.type === 'core' || exercise.type === 'mobility' || exercise.type === 'recovery' || exercise.type === 'cardio') {
                        setsHTML += `
                            <div class="set-input">
                                <label>Set ${i}:</label>
                                <input type="number" placeholder="Reps" data-exercise="${exerciseIndex}" data-set="${i}" data-type="reps">
                            </div>
                        `;
                    } else {
                        setsHTML += `
                            <div class="set-input">
                                <label>Set ${i}:</label>
                                <input type="number" placeholder="Weight" data-exercise="${exerciseIndex}" data-set="${i}" data-type="weight">
                                <input type="number" placeholder="Reps" data-exercise="${exerciseIndex}" data-set="${i}" data-type="reps">
                            </div>
                        `;
                    }
                }

                exerciseDiv.innerHTML = `
                    <div class="exercise-name">${exercise.name}</div>
                    <div class="exercise-details">${exercise.details}</div>
                    <div class="sets-container">
                        ${setsHTML}
                    </div>
                `;

                workoutContainer.appendChild(exerciseDiv);
            });
        }

        function saveWorkout() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const workout = workoutSchedule[dayOfWeek];

            if (workout.exercises.length === 0) {
                showMessage('saveMessage', 'No workout to save for rest day!');
                return;
            }

            const workoutLog = {
                date: today.toISOString().split('T')[0],
                dayOfWeek: getDayName(dayOfWeek),
                workoutType: workout.title,
                exercises: []
            };

            workout.exercises.forEach((exercise, exerciseIndex) => {
                const exerciseLog = {
                    name: exercise.name,
                    sets: []
                };

                for (let i = 1; i <= exercise.sets; i++) {
                    const weightInput = document.querySelector(`input[data-exercise="${exerciseIndex}"][data-set="${i}"][data-type="weight"]`);
                    const repsInput = document.querySelector(`input[data-exercise="${exerciseIndex}"][data-set="${i}"][data-type="reps"]`);

                    const set = {
                        set: i,
                        reps: repsInput ? parseInt(repsInput.value) || 0 : 0
                    };

                    if (weightInput) {
                        set.weight = parseFloat(weightInput.value) || 0;
                    }

                    exerciseLog.sets.push(set);
                }

                workoutLog.exercises.push(exerciseLog);
            });

            // Save to localStorage
            const userLogs = JSON.parse(localStorage.getItem(`workoutLogs_${currentUser}`) || '[]');
            userLogs.unshift(workoutLog); // Add to beginning for newest first
            localStorage.setItem(`workoutLogs_${currentUser}`, JSON.stringify(userLogs));

            showMessage('saveMessage', 'Workout saved successfully!');
        }

        // Weekly Plan functions
        function loadWeeklyPlan() {
            const planContainer = document.getElementById('weeklyPlanContent');
            const today = new Date().getDay();
            
            planContainer.innerHTML = '';

            // Days of the week starting with Monday (reorder for better flow)
            const dayOrder = [1, 2, 3, 4, 5, 6, 0]; // Mon, Tue, Wed, Thu, Fri, Sat, Sun
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            dayOrder.forEach(dayIndex => {
                const workout = workoutSchedule[dayIndex];
                const dayDiv = document.createElement('div');
                dayDiv.className = `plan-day ${dayIndex === today ? 'current-day' : ''}`;

                let contentHTML = '';
                if (workout.exercises.length === 0) {
                    contentHTML = '<div class="rest-day">🛌 Rest Day - Recovery and relaxation</div>';
                } else {
                    contentHTML = workout.exercises.map(exercise => `
                        <div class="plan-exercise">
                            <div class="plan-exercise-name">${exercise.name}</div>
                            <div class="plan-exercise-details">${exercise.details}</div>
                        </div>
                    `).join('');
                }

                dayDiv.innerHTML = `
                    <div class="plan-day-header">
                        <div class="plan-day-title">${dayNames[dayIndex]}: ${workout.title}</div>
                        <div class="plan-day-subtitle">${workout.subtitle}</div>
                    </div>
                    <div class="plan-day-content">
                        ${contentHTML}
                    </div>
                `;

                planContainer.appendChild(dayDiv);
            });
        }

        // History functions
        function loadHistory() {
            const userLogs = JSON.parse(localStorage.getItem(`workoutLogs_${currentUser}`) || '[]');
            const historyContainer = document.getElementById('historyContent');

            if (userLogs.length === 0) {
                historyContainer.innerHTML = '<p style="text-align: center; color: #666;">No workout history found. Complete your first workout!</p>';
                return;
            }

            historyContainer.innerHTML = '';

            userLogs.forEach((log, index) => {
                const historyDiv = document.createElement('div');
                historyDiv.className = 'history-item';

                let exercisesHTML = '';
                log.exercises.forEach(exercise => {
                    let setsText = exercise.sets.map(set => {
                        if (set.weight) {
                            return `${set.weight}lbs x ${set.reps}`;
                        } else {
                            return `${set.reps} reps`;
                        }
                    }).join(', ');

                    exercisesHTML += `
                        <div style="margin-bottom: 15px;">
                            <strong>${exercise.name}:</strong> ${setsText}
                        </div>
                    `;
                });

                historyDiv.innerHTML = `
                    <div class="history-header" onclick="toggleHistory(${index})">
                        <div>
                            <div class="history-date">${formatDate(log.date)} - ${log.dayOfWeek}</div>
                            <div class="history-workout">${log.workoutType}</div>
                        </div>
                        <div style="font-size: 1.2rem;">▼</div>
                    </div>
                    <div class="history-details" id="history-${index}">
                        ${exercisesHTML}
                    </div>
                `;

                historyContainer.appendChild(historyDiv);
            });
        }

        function toggleHistory(index) {
            const details = document.getElementById(`history-${index}`);
            details.classList.toggle('show');
        }

        // Analytics functions
        function loadAnalytics() {
            const userLogs = JSON.parse(localStorage.getItem(`workoutLogs_${currentUser}`) || '[]');
            const analyticsContainer = document.getElementById('analyticsContent');

            if (userLogs.length === 0) {
                analyticsContainer.innerHTML = '<p style="text-align: center; color: #666;">No data available for analytics. Complete some workouts first!</p>';
                return;
            }

            // Key exercises to track
            const keyExercises = [
                'Barbell Bench Press',
                'Barbell Back Squats', 
                'Barbell Deadlifts',
                'Bent-Over Barbell Rows'
            ];

            let chartsHTML = '';
            keyExercises.forEach(exerciseName => {
                chartsHTML += `
                    <div class="chart-container">
                        <div class="chart-title">${exerciseName} Progress</div>
                        <canvas class="chart" id="chart-${exerciseName.replace(/\s+/g, '')}" width="800" height="300"></canvas>
                    </div>
                `;
            });

            // Calculate statistics
            const totalWorkouts = userLogs.length;
            const workoutTypes = {};
            let totalVolume = 0;

            userLogs.forEach(log => {
                workoutTypes[log.workoutType] = (workoutTypes[log.workoutType] || 0) + 1;
                
                log.exercises.forEach(exercise => {
                    exercise.sets.forEach(set => {
                        if (set.weight && set.reps) {
                            totalVolume += set.weight * set.reps;
                        }
                    });
                });
            });

            const consistency = calculateConsistency(userLogs);

            analyticsContainer.innerHTML = `
                ${chartsHTML}
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${totalWorkouts}</div>
                        <div class="stat-label">Total Workouts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${Math.round(totalVolume).toLocaleString()}</div>
                        <div class="stat-label">Total Volume (lbs)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${consistency}%</div>
                        <div class="stat-label">7-Day Consistency</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${Object.keys(workoutTypes).length}</div>
                        <div class="stat-label">Workout Types</div>
                    </div>
                </div>
            `;

            // Draw charts after DOM is updated
            setTimeout(() => {
                keyExercises.forEach(exerciseName => {
                    drawProgressChart(exerciseName, userLogs);
                });
            }, 100);
        }

        function drawProgressChart(exerciseName, userLogs) {
            const canvasId = `chart-${exerciseName.replace(/\s+/g, '')}`;
            const canvas = document.getElementById(canvasId);
            
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const data = [];

            // Extract data for this exercise
            userLogs.reverse().forEach(log => {
                const exercise = log.exercises.find(ex => ex.name === exerciseName);
                if (exercise && exercise.sets.length > 0) {
                    // Get max weight from all sets
                    const maxWeight = Math.max(...exercise.sets.map(set => set.weight || 0));
                    if (maxWeight > 0) {
                        data.push({
                            date: log.date,
                            weight: maxWeight
                        });
                    }
                }
            });

            if (data.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('No data available', canvas.width / 2, canvas.height / 2);
                return;
            }

            // Chart dimensions
            const padding = 60;
            const chartWidth = canvas.width - 2 * padding;
            const chartHeight = canvas.height - 2 * padding;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Find min/max values
            const minWeight = Math.min(...data.map(d => d.weight));
            const maxWeight = Math.max(...data.map(d => d.weight));
            const weightRange = maxWeight - minWeight || 1;

            // Draw axes
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();

            // Draw grid lines
            ctx.strokeStyle = '#f0f0f0';
            for (let i = 1; i <= 5; i++) {
                const y = padding + (chartHeight * i / 5);
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
            }

            // Draw data points and line
            ctx.strokeStyle = '#667eea';
            ctx.fillStyle = '#667eea';
            ctx.lineWidth = 2;

            if (data.length > 1) {
                ctx.beginPath();
                data.forEach((point, index) => {
                    const x = padding + (chartWidth * index / (data.length - 1));
                    const y = canvas.height - padding - ((point.weight - minWeight) / weightRange * chartHeight);
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }

            // Draw data points
            data.forEach((point, index) => {
                const x = padding + (chartWidth * index / Math.max(data.length - 1, 1));
                const y = canvas.height - padding - ((point.weight - minWeight) / weightRange * chartHeight);
                
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fill();
            });

            // Draw labels
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';

            // Y-axis labels (weights)
            for (let i = 0; i <= 5; i++) {
                const weight = minWeight + (weightRange * i / 5);
                const y = canvas.height - padding - (chartHeight * i / 5);
                ctx.textAlign = 'right';
                ctx.fillText(Math.round(weight), padding - 10, y + 4);
            }

            // X-axis labels (dates)
            ctx.textAlign = 'center';
            data.forEach((point, index) => {
                if (index % Math.ceil(data.length / 6) === 0) {
                    const x = padding + (chartWidth * index / Math.max(data.length - 1, 1));
                    const date = new Date(point.date);
                    ctx.fillText(
                        `${date.getMonth() + 1}/${date.getDate()}`,
                        x,
                        canvas.height - padding + 20
                    );
                }
            });

            userLogs.reverse(); // Restore original order
        }

        function calculateConsistency(userLogs) {
            const today = new Date();
            const sevenDaysAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            const recentWorkouts = userLogs.filter(log => {
                const logDate = new Date(log.date);
                return logDate >= sevenDaysAgo && logDate <= today;
            });

            return Math.round((recentWorkouts.length / 7) * 100);
        }

        // Utility functions
        function getDayName(dayIndex) {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            return days[dayIndex];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function showSuccess(elementId, message) {
            const successElement = document.getElementById(elementId);
            successElement.textContent = message;
            successElement.style.display = 'block';
        }

        function showMessage(elementId, message) {
            const messageElement = document.getElementById(elementId);
            messageElement.textContent = message;
            messageElement.style.display = 'block';
            setTimeout(() => {
                messageElement.style.display = 'none';
            }, 3000);
        }

        function clearErrors() {
            document.querySelectorAll('.error, .success').forEach(el => {
                el.style.display = 'none';
            });
        }

        // Event listeners for Enter key
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });

            document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    register();
                }
            });
        });
    </script>
</body>
</html>
